services:
  - type: web
    name: essay-pilot
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_URL
        sync: false
      - key: DATABASE_PATH
        value: ./data/essay_pilot_clean.db
      - key: UPLOADS_DIR
        value: ./uploads
      - key: OCR_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_OCR_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_ANALYSIS_MODEL
        value: gemini-2.5-flash
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: RUN_BOT_WITH_WEB
        value: true
      - key: TELEGRAM_BOT_MODE
        value: webhook
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: ALLOW_DEMO_AUTH
        value: "false"
      - key: TELEGRAM_AUTH_MAX_AGE_SECONDS
        value: "86400"
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: PAYMENT_CARD
        sync: false
      - key: PAYMENT_CARD_HOLDER
        sync: false
      - key: PAYMENT_ADMIN_USERNAME
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
